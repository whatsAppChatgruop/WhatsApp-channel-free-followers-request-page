<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>واگذاری کانال واتساپ</title>

<link rel="stylesheet" href="style.css">

</head>

<body>


<div class="box">

<h1>🚀 واگذاری و مدیریت کانال واتساپ</h1>

<p>
اگر مالک کانال هستید و قصد واگذاری مدیریت کانال خود را دارید،
درخواست خود را ثبت کنید.
</p>


<label>
نام کانال:
</label>

<input id="channelName" type="text" placeholder="نام کانال">


<label>
لینک کانال:
</label>

<input id="channelLink" type="text" placeholder="لینک واتساپ">


<label>
شماره تماس مالک:
</label>

<input id="ownerNumber" type="text" placeholder="شماره واتساپ">


<div class="agree">

<input type="checkbox" id="agree">

<span>
من مالک کانال هستم و با ثبت این درخواست موافقم.
</span>

</div>


<button onclick="sendRequest()">
ثبت درخواست
</button>


<p id="result"></p>


</div>


<script src="script.js"></script>

</body>

</html>
